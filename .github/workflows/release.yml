name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 0.3.0). Leave empty to auto-detect from conventional commits."
        required: false
        type: string
      force:
        description: "Force bump level when auto-detecting (leave empty for commit-based detection)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine python-semantic-release

      - name: Determine version
        id: semver
        run: |
          ARGS=()
          if [ -n "${{ inputs.version }}" ]; then
            ARGS+=(--version "${{ inputs.version }}")
          fi
          if [ -n "${{ inputs.force }}" ]; then
            ARGS+=(--force "${{ inputs.force }}")
          fi
          if [ "${#ARGS[@]}" -gt 0 ]; then
            VERSION=$(python3 scripts/release_workflow.py determine-version "${ARGS[@]}")
          else
            VERSION=$(python3 scripts/release_workflow.py determine-version)
          fi
          if [ -z "$VERSION" ]; then
            echo "::notice::No unreleased version found in pyproject.toml and no semantic-release bump was detected."
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Resolved release version: $VERSION"
          fi

      - name: Check tag does not already exist
        if: steps.semver.outputs.version != ''
        run: |
          if git rev-parse "v${{ steps.semver.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.semver.outputs.version }} already exists"
            exit 1
          fi

      - name: Bump version in pyproject.toml and CHANGELOG.md
        if: steps.semver.outputs.version != ''
        run: |
          python scripts/bump_version.py "${{ steps.semver.outputs.version }}"
          if git diff --quiet; then
            echo "Files already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pyproject.toml CHANGELOG.md
            git commit -m "release: v${{ steps.semver.outputs.version }}"
            git push origin HEAD
          fi

      - name: Build release notes
        if: steps.semver.outputs.version != ''
        run: python3 scripts/release_workflow.py release-notes "${{ steps.semver.outputs.version }}" > release-notes.md

      - name: Create and push tag
        if: steps.semver.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.semver.outputs.version }}" -m "Release v${{ steps.semver.outputs.version }}"
          git push origin "v${{ steps.semver.outputs.version }}"

      - name: Build package
        if: steps.semver.outputs.version != ''
        run: python -m build

      - name: Verify package
        if: steps.semver.outputs.version != ''
        run: twine check dist/*

      - name: Create GitHub Release
        if: steps.semver.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semver.outputs.version }}
          files: dist/*
          body_path: release-notes.md

  publish:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    environment: CD
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI }}

      - name: Delete merged branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name')
          gh api "repos/${{ github.repository }}/branches" --paginate -q '.[].name' | while read -r branch; do
            if [ "$branch" = "$DEFAULT_BRANCH" ]; then
              continue
            fi
            MERGED=$(gh api "repos/${{ github.repository }}/compare/${DEFAULT_BRANCH}...${branch}" -q '.status' 2>/dev/null || echo "error")
            if [ "$MERGED" = "behind" ] || [ "$MERGED" = "identical" ]; then
              echo "Deleting merged branch: $branch"
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${branch}" 2>/dev/null || true
            fi
          done
