name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short

  smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install via pipx
        run: |
          pip install pipx
          pipx install .

      - name: reflect --demo (dashboard server starts)
        run: |
          timeout 5 reflect --demo --db-path "$RUNNER_TEMP/reflect-smoke.db" || code=$?
          # timeout exit code 124 means it ran and we killed it - success
          if [ "${code:-0}" -eq 124 ]; then
            echo "Server started successfully"
          elif [ "${code:-0}" -eq 0 ]; then
            echo "Server exited cleanly"
          else
            echo "Unexpected exit code: $code"
            exit 1
          fi
        env:
          # prevent actual browser open in CI
          BROWSER: "echo"

      - name: Build and verify package
        run: |
          pip install build twine
          python -m build
          twine check dist/*

  pages-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify GitHub Pages assets exist
        run: |
          test -f docs/index.html    || { echo "docs/index.html missing"; exit 1; }
          test -f docs/CNAME         || { echo "docs/CNAME missing"; exit 1; }
          test -f docs/robots.txt    || { echo "docs/robots.txt missing"; exit 1; }
          test -f docs/sitemap.xml   || { echo "docs/sitemap.xml missing"; exit 1; }
          test -f docs/favicon.svg   || { echo "docs/favicon.svg missing"; exit 1; }
          test -f docs/og-image-v2.png || { echo "docs/og-image-v2.png missing"; exit 1; }
          echo "All GitHub Pages assets present"

      - name: Validate HTML structure
        run: |
          grep -q '<!DOCTYPE html>' docs/index.html || { echo "docs/index.html missing DOCTYPE"; exit 1; }
          grep -q '<head>' docs/index.html          || { echo "docs/index.html missing <head>"; exit 1; }
          grep -q '<body>' docs/index.html          || { echo "docs/index.html missing <body>"; exit 1; }
          echo "✓ docs/index.html valid"

      - name: Validate SEO and positioning metadata
        run: |
          grep -q '<meta name="description"'        docs/index.html || { echo "docs/index.html missing meta description"; exit 1; }
          grep -q '<link rel="canonical"'           docs/index.html || { echo "docs/index.html missing canonical link"; exit 1; }
          grep -q '<meta property="og:title"'       docs/index.html || { echo "docs/index.html missing og:title"; exit 1; }
          grep -q '<meta property="og:description"' docs/index.html || { echo "docs/index.html missing og:description"; exit 1; }
          grep -q '<meta property="og:image"'       docs/index.html || { echo "docs/index.html missing og:image"; exit 1; }
          grep -q '<meta name="twitter:card"'       docs/index.html || { echo "docs/index.html missing twitter:card"; exit 1; }
          grep -q 'application/ld+json'             docs/index.html || { echo "docs/index.html missing JSON-LD"; exit 1; }
          grep -q 'OpenTelemetry'                   docs/index.html || { echo "docs/index.html must mention OpenTelemetry"; exit 1; }
          echo "✓ docs/index.html SEO metadata present"
          grep -q 'Sitemap:' docs/robots.txt           || { echo "robots.txt missing Sitemap line"; exit 1; }
          grep -q 'reflect.o11y.dev' docs/sitemap.xml  || { echo "sitemap.xml missing canonical host"; exit 1; }
